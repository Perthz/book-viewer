<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Book — 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f1ec; overflow: hidden; font-family: system-ui, sans-serif; }
    #viewer { width: 100vw; height: 100vh; display: block; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #f4f1ec; color: #888; font-size: 1rem; z-index: 10;
    }
    #hint { position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); color: #bbb; font-size: 0.75rem; pointer-events: none; text-align: center; }
    #controls {
      position: fixed; top: 20px; right: 20px;
      background: rgba(20, 20, 26, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 18px 20px;
      color: #e0e0e0; font-size: 0.8rem;
      width: 220px;
      backdrop-filter: blur(12px);
      z-index: 20; display: none;
    }
    #controls h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 14px; font-weight: 500; }
    .dim-row { margin-bottom: 12px; }
    .dim-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .dim-label span:first-child { color: #aaa; }
    .dim-label span:last-child { color: #fff; font-weight: 600; min-width: 60px; text-align: right; }
    .dim-unit { color: #555; font-size: 0.7rem; margin-left: 2px; }
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: #6c8fff; border-radius: 50%; cursor: pointer; box-shadow: 0 0 8px rgba(108,143,255,0.5); }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 14px 0; }
    .cover-row { margin-top: 14px; }
    .cover-row label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 6px; font-weight: 500; }
    #coverInput { display: none; }
    .cover-btn { display: flex; align-items: center; gap: 6px; width: 100%; padding: 7px 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #ccc; font-size: 0.75rem; cursor: pointer; transition: background 0.2s; }
    .cover-btn:hover { background: rgba(255,255,255,0.1); }
    .cover-btn svg { flex-shrink: 0; }
    #coverName { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #888; font-size: 0.7rem; }
    #coverPreview { width: 100%; height: 60px; object-fit: cover; border-radius: 4px; margin-top: 8px; display: none; border: 1px solid rgba(255,255,255,0.08); }
    #uvDebug { font-size: 0.65rem; color: #4a9eff; margin-top: 6px; display: none; word-break: break-all; }
    #resetBtn { width: 100%; padding: 7px; background: rgba(108,143,255,0.15); border: 1px solid rgba(108,143,255,0.3); border-radius: 6px; color: #6c8fff; font-size: 0.75rem; cursor: pointer; transition: background 0.2s; }
    #resetBtn:hover { background: rgba(108,143,255,0.25); }

    .color-row { margin-top: 14px; }
    .color-row label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; margin-bottom: 6px; font-weight: 500; }
    input[type="color"] { width: 100%; height: 36px; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: none; cursor: pointer; padding: 2px; }

    #openBtn {
      width: 100%; padding: 9px;
      background: rgba(255, 160, 80, 0.18); border: 1px solid rgba(255, 160, 80, 0.35);
      border-radius: 6px; color: #ffb060; font-size: 0.78rem;
      cursor: pointer; transition: background 0.2s; font-weight: 500;
    }
    #openBtn:hover { background: rgba(255, 160, 80, 0.30); }
    #openBtn.open { background: rgba(80, 220, 130, 0.15); border-color: rgba(80, 220, 130, 0.35); color: #50dc82; }

    .anim-row { margin-top: 12px; }
    .anim-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .anim-label span:first-child { color: #aaa; font-size: 0.72rem; }
    .anim-label span:last-child { color: #fff; font-weight: 600; font-size: 0.72rem; }
  </style>
</head>
<body>

<div id="viewer"></div>
<div id="loading">Loading model…</div>
<div id="hint">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

<div id="controls">
  <h3>Book Dimensions</h3>
  <div class="dim-row">
    <div class="dim-label"><span>Width</span><span><span id="wVal">14.0</span><span class="dim-unit">cm</span></span></div>
    <input type="range" id="wSlider" min="5" max="50" step="0.5" value="14">
  </div>
  <div class="dim-row">
    <div class="dim-label"><span>Height</span><span><span id="hVal">21.0</span><span class="dim-unit">cm</span></span></div>
    <input type="range" id="hSlider" min="5" max="40" step="0.5" value="21">
  </div>
  <div class="dim-row">
    <div class="dim-label"><span>Thickness</span><span><span id="tVal">1.0</span><span class="dim-unit">cm</span></span></div>
    <input type="range" id="tSlider" min="0.3" max="5" step="0.1" value="1">
  </div>
  <hr class="divider">

  <button id="openBtn">Open Book</button>

  <div class="anim-row">
    <div class="anim-label"><span>Open Amount</span><span><span id="openVal">0</span>%</span></div>
    <input type="range" id="openSlider" min="0" max="100" step="1" value="0">
  </div>

  <hr class="divider">
  <button id="resetBtn">Reset</button>

  <div class="color-row">
    <label>Book Color</label>
    <input type="color" id="colorPicker" value="#5a7b5a">
  </div>

  <div class="cover-row">
    <label>Front Cover Image</label>
    <input type="file" id="coverInput" accept="image/*">
    <button class="cover-btn" id="coverBtn">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <span id="coverName">Choose image…</span>
    </button>
    <img id="coverPreview" alt="Cover preview">
    <div id="uvDebug"></div>
    <button id="unlockBtn" style="display:none; width:100%; margin-top:8px; padding:6px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:6px; color:#aaa; font-size:0.7rem; cursor:pointer;">✕ Unlock W : H ratio</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const container = document.getElementById('viewer');
const loading  = document.getElementById('loading');
const controls = document.getElementById('controls');

const sliders = {
  w: document.getElementById('wSlider'),
  h: document.getElementById('hSlider'),
  t: document.getElementById('tSlider'),
};
const vals = {
  w: document.getElementById('wVal'),
  h: document.getElementById('hVal'),
  t: document.getElementById('tVal'),
};
const openSlider = document.getElementById('openSlider');
const openVal    = document.getElementById('openVal');
const openBtn    = document.getElementById('openBtn');

// ── Biblio light theme ─────────────────────────────────────────────────────
const THEME = {
  background: 0xf4f1ec,
  // Notebook scene is in cm (1 unit = 1 cm) while biblio is meters; scale fog ×100.
  fog: { color: 0xf4f1ec, near: 800, far: 2200 },
  ambient: { top: 0xfffdf5, bottom: 0xe8e4dc, intensity: 0.5 },
  keyLight: { color: 0xfff8e8, intensity: 1.5, pos: [4, 8, 5] },
  fillLight: { color: 0xf0f4f8, intensity: 0.35, pos: [-5, 3, 2] },
  rimLight: { color: 0xffffff, intensity: 0.25, pos: [0, 2, -4] },
  exposure: 1.15,
};

// ── Renderer ──────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMappingExposure = THEME.exposure;
container.appendChild(renderer.domElement);

// ── Scene ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = makeGradientTexture(THEME.background, 0xebe6dd);
scene.fog = new THREE.Fog(THEME.fog.color, THEME.fog.near, THEME.fog.far);

function makeGradientTexture(top, bottom) {
  const c = document.createElement('canvas');
  c.width = 2; c.height = 256;
  const g = c.getContext('2d').createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, '#' + top.toString(16).padStart(6, '0'));
  g.addColorStop(0.55, '#' + top.toString(16).padStart(6, '0'));
  g.addColorStop(1, '#' + bottom.toString(16).padStart(6, '0'));
  const ctx = c.getContext('2d');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 2, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

// ── Camera ──────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);

// ── Controls ─────────────────────────────────────────────────────────────────
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.06;
orbitControls.minDistance = 0.5;
orbitControls.maxDistance = 50;
orbitControls.target.set(0, 0, 0);

// ── Lights (biblio rig, no shadow casting) ──────────────────────────────────
const hemi = new THREE.HemisphereLight(THEME.ambient.top, THEME.ambient.bottom, THEME.ambient.intensity);
scene.add(hemi);

const key = new THREE.DirectionalLight(THEME.keyLight.color, THEME.keyLight.intensity);
key.position.set(...THEME.keyLight.pos);
scene.add(key);

const fill = new THREE.DirectionalLight(THEME.fillLight.color, THEME.fillLight.intensity);
fill.position.set(...THEME.fillLight.pos);
scene.add(fill);

const rim = new THREE.DirectionalLight(THEME.rimLight.color, THEME.rimLight.intensity);
rim.position.set(...THEME.rimLight.pos);
scene.add(rim);

// ── Book state ───────────────────────────────────────────────────────────────
const DEFAULT_W = 14, DEFAULT_H = 21, DEFAULT_T = 1;
const DEFAULT_COLOR = '#5a7b5a';

let bookGroup  = null;
let baseSize   = { x: 1, y: 1, z: 1 };
let mixer     = null;
let animAction = null;
let animClip  = null;
let coverMesh  = null;
let currentTexture = null;
let isOpen     = false;
let animating  = false;
let openAmount = 0; // 0 = closed, 1 = open

function applySize(wCm, hCm, tCm) {
  if (!bookGroup) return;
  // Model axes: X = width, Y = thickness (page stack), Z = height (vertical)
  // 1 scene unit = 1 cm, scaled relative to the model's intrinsic size.
  bookGroup.scale.set(wCm / baseSize.x, tCm / baseSize.y, hCm / baseSize.z);
  sitOnGround();
}

function sitOnGround() {
  if (!bookGroup) return;
  bookGroup.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(bookGroup);
  if (isFinite(box.min.y)) bookGroup.position.y -= box.min.y;
}

function setOpenAmount(t) {
  if (!animAction) return;
  openAmount = Math.max(0, Math.min(1, t));
  animAction.time = openAmount * animDuration;
  mixer.update(0);
  sitOnGround();
  openSlider.value = Math.round(openAmount * 100);
  openVal.textContent = Math.round(openAmount * 100);
  openBtn.textContent = isOpen ? 'Close Book' : 'Open Book';
  openBtn.classList.toggle('open', openAmount > 0.05);
}

let animDuration = 0;

function toggleOpen() {
  if (animating) return;
  isOpen = !isOpen;
  const target = isOpen ? 1 : 0;
  const start  = openAmount;
  const dur    = 1.2; // seconds
  let elapsed  = 0;
  animating = true;

  function step(dt) {
    elapsed += dt;
    let pct = Math.min(elapsed / dur, 1);
    pct = 1 - Math.pow(1 - pct, 3); // ease-out cubic
    setOpenAmount(start + (target - start) * pct);
    if (pct < 1) {
      requestAnimationFrame(step);
    } else {
      animating = false;
    }
  }
  requestAnimationFrame(step);
}

openBtn.addEventListener('click', toggleOpen);
openSlider.addEventListener('input', () => {
  setOpenAmount(parseInt(openSlider.value) / 100);
});

// ── Load model ──────────────────────────────────────────────────────────────
const loader = new GLTFLoader();
loader.load(
  './scene.gltf',
  (gltf) => {
    bookGroup = new THREE.Group();
    scene.add(bookGroup);

    bookGroup.add(gltf.scene);
    // Stand the book upright: model's Z axis (page top→bottom) → world Y (up).
    bookGroup.rotation.x = -Math.PI / 2;

    // Measure intrinsic size at scale 1 so cm sliders map to scene units.
    const measureBox = new THREE.Box3().setFromObject(gltf.scene);
    const measured = measureBox.getSize(new THREE.Vector3());
    baseSize = { x: measured.x, y: measured.y, z: measured.z };

    // Center
    const box = new THREE.Box3().setFromObject(bookGroup);
    const center = box.getCenter(new THREE.Vector3());
    bookGroup.position.sub(center);

    // Set up animation
    if (gltf.animations.length > 0) {
      mixer    = new THREE.AnimationMixer(bookGroup);
      animClip = gltf.animations[0];
      animAction = mixer.clipAction(animClip);
      animDuration = animClip.duration;
      animAction.play();
      animAction.paused = true;
      animAction.time = 0;
    }

    // Split the skinned mesh into 4 material groups by bone family:
    //   0 = front cover (kaft_R*), 1 = back cover (kaft_L*), 2 = spine (stam*), 3 = pages
    // The original cover used one shared material with overlapping UV regions, so a
    // single uploaded image was being mirrored onto the back. Splitting per region
    // lets the front/back/spine each carry their own texture.
    let skinnedMesh = null;
    gltf.scene.traverse((child) => { if (child.isSkinnedMesh && !skinnedMesh) skinnedMesh = child; });

    if (skinnedMesh) {
      const geom = skinnedMesh.geometry;

      // Normalize UVs to [0,1] so uploaded images fill the full face without inset borders.
      // Use ALL vertices' UV range as the reference so the cover UVs are expanded to fill [0,1].
      // With ClampToEdgeWrapping this avoids sampling garbage at UV edges.
      const uvAttr = geom.attributes.uv;
      if (uvAttr) {
        const uvArr = uvAttr.array;
        let uMin = Infinity, uMax = -Infinity, vMin = Infinity, vMax = -Infinity;
        for (let i = 0; i < uvArr.length; i += 2) {
          const u = uvArr[i], v = uvArr[i + 1];
          if (u < uMin) uMin = u; if (u > uMax) uMax = u;
          if (v < vMin) vMin = v; if (v > vMax) vMax = v;
        }
        const uRange = uMax - uMin, vRange = vMax - vMin;
        for (let i = 0; i < uvArr.length; i += 2) {
          uvArr[i]     = (uvArr[i]     - uMin) / uRange;
          uvArr[i + 1] = (uvArr[i + 1] - vMin) / vRange;
        }
        uvAttr.needsUpdate = true;
      }

      // Map joint array indices → material groups directly (no skeleton lookup needed).
      // Joints per GLTF skin: [node5, node7, node8, node9, node10, node11, node12, node13, node14, node15]
      //   joints[2] = node8  (kaft_R_01) = front cover → group 0
      //   joints[3] = node9  (kaft_L_02) = back cover  → group 1
      //   joints[1] = node7  (stam_00)   = spine       → group 2
      //   all others                       = pages     → group 3
      // Hardcoded: jointIdx → group (avoiding any skeleton.bones.find() issues)
      const hardcodedGroup = [3, 2, 0, 1, 3, 3, 3, 3, 3, 3]; // index matches joints array

      const skinIndex  = geom.attributes.skinIndex.array;
      const skinWeight = geom.attributes.skinWeight.array;
      const index      = geom.index.array;

      // Dominant group of a vertex = highest summed bone weight among the 4 buckets.
      const vertGroup = (vi) => {
        const w = [0.0, 0.0, 0.0, 0.0];
        for (let k = 0; k < 4; k++) {
          const ji = skinIndex[vi * 4 + k];     // joint array index (0-9)
          const wt = skinWeight[vi * 4 + k];
          const g = hardcodedGroup[ji] ?? 3;
          w[g] += wt;
        }
        if (w[0] >= w[1] && w[0] >= w[2] && w[0] >= w[3]) return 0;
        if (w[1] >= w[2] && w[1] >= w[3]) return 1;
        if (w[2] >= w[3]) return 2;
        return 3;
      };

      // Triangle bucketing: STRICT — all three vertices must agree on the group,
      // otherwise the triangle goes to pages. Majority voting let cover-edge
      // triangles spill colour onto the page block; strict classification keeps
      // each material region clean.
      const buckets = [[], [], [], []];
      for (let i = 0; i < index.length; i += 3) {
        const a = index[i], b = index[i + 1], c = index[i + 2];
        const ga = vertGroup(a), gb = vertGroup(b), gc = vertGroup(c);
        const g = (ga === gb && gb === gc) ? ga : 3;
        buckets[g].push(a, b, c);
      }

      const total = buckets.reduce((s, b) => s + b.length, 0);
      const reordered = new (index.constructor)(total);
      let off = 0;
      const groupRanges = buckets.map((b) => { const r = { start: off, count: b.length }; reordered.set(b, off); off += b.length; return r; });
      geom.setIndex(new THREE.BufferAttribute(reordered, 1));
      geom.clearGroups();
      groupRanges.forEach((r, i) => { if (r.count > 0) geom.addGroup(r.start, r.count, i); });

      const originalMat = skinnedMesh.material;
      const frontMat = originalMat.clone();
      const backMat  = originalMat.clone();
      const spineMat = originalMat.clone();
      const pageMat  = originalMat.clone();
      // Debug colors: front=blue, back=green, spine=purple, pages=cream
      frontMat.color.set(0x0066ff);
      backMat.color.set(0x00ff00);
      spineMat.color.set(0x9900ff);
      pageMat.color.set(0xf5f1e8);
      pageMat.map = null;
      pageMat.emissive?.set(0x000000);   // no emissive — keeps paper a flat cream
      pageMat.side = THREE.DoubleSide;
      skinnedMesh.material = [frontMat, backMat, spineMat, pageMat];
      coverMesh = skinnedMesh;
      coverMesh._coverMatIndex = 0;     // legacy: applyColor still drives the front
      coverMesh._frontMat = frontMat;
      coverMesh._backMat  = backMat;
      coverMesh._spineMat = spineMat;
      coverMesh._pageMat  = pageMat;

    }

    applySize(DEFAULT_W, DEFAULT_H, DEFAULT_T);
    applyColor(document.getElementById('colorPicker').value);

    // Fit camera to book
    const fitBox = new THREE.Box3().setFromObject(bookGroup);
    const size   = fitBox.getSize(new THREE.Vector3());
    const fitCenter = fitBox.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const dist   = maxDim / (2 * Math.tan((camera.fov * Math.PI / 180) / 2)) * 2.2;
    camera.position.set(fitCenter.x + dist * 0.5, fitCenter.y + dist * 0.35, fitCenter.z + dist);
    camera.lookAt(fitCenter);
    orbitControls.target.copy(fitCenter);
    orbitControls.update();

    controls.style.display = 'block';
    loading.style.display = 'none';
  },
  undefined,
  (err) => { loading.textContent = 'Error: ' + err.message; }
);

// ── Dimension sliders ───────────────────────────────────────────────────────
function onSlider(source) {
  let w = parseFloat(sliders.w.value);
  let h = parseFloat(sliders.h.value);
  const t = parseFloat(sliders.t.value);

  // Couple W↔H to the cover image's aspect ratio when locked.
  if (lockedRatio && !suppressSlider) {
    suppressSlider = true;
    if (source === 'w') {
      h = clampSlider(sliders.h, w * lockedRatio);
      sliders.h.value = h;
    } else if (source === 'h') {
      w = clampSlider(sliders.w, h / lockedRatio);
      sliders.w.value = w;
    }
    suppressSlider = false;
  }

  vals.w.textContent = w.toFixed(1);
  vals.h.textContent = h.toFixed(1);
  vals.t.textContent = t.toFixed(1);
  applySize(w, h, t);
}

function clampSlider(el, v) {
  return Math.max(parseFloat(el.min), Math.min(parseFloat(el.max), v));
}

sliders.w.addEventListener('input', () => onSlider('w'));
sliders.h.addEventListener('input', () => onSlider('h'));
sliders.t.addEventListener('input', () => onSlider('t'));

document.getElementById('resetBtn').addEventListener('click', () => {
  sliders.w.value = DEFAULT_W;
  sliders.h.value = DEFAULT_H;
  sliders.t.value = DEFAULT_T;
  setRatioLock(null);
  onSlider();
  document.getElementById('colorPicker').value = DEFAULT_COLOR;
  applyColor(DEFAULT_COLOR);
  setOpenAmount(0);
  isOpen = false;
  animating = false;
});

// ── Color ───────────────────────────────────────────────────────────────────
function coverMaterials() {
  if (!coverMesh) return [];
  return [coverMesh._frontMat, coverMesh._backMat, coverMesh._spineMat].filter(Boolean);
}
function applyColor(hex) {
  // Color picker drives all three cover regions; the upload pipeline overrides
  // back/spine with a sampled colour from the image.
  for (const m of coverMaterials()) {
    m.color.set(hex);
    m.needsUpdate = true;
  }
}

document.getElementById('colorPicker').addEventListener('input', (e) => {
  // Manual colour change drops any image-driven texture so the colour shows through.
  if (currentTexture) {
    if (coverMesh?._frontMat) { coverMesh._frontMat.map = null; coverMesh._frontMat.needsUpdate = true; }
    currentTexture.dispose();
    currentTexture = null;
  }
  applyColor(e.target.value);
});

// ── Cover image ─────────────────────────────────────────────────────────────
const coverInput   = document.getElementById('coverInput');
const coverBtn     = document.getElementById('coverBtn');
const coverNameEl  = document.getElementById('coverName');
const coverPreview = document.getElementById('coverPreview');

coverBtn.addEventListener('click', () => coverInput.click());

// Aspect-ratio lock: when a cover is uploaded, dragging width auto-updates height
// (and vice versa) to preserve the image's W:H. Unlock button releases.
let lockedRatio = null; // height / width, or null
let suppressSlider = false;

function setRatioLock(r) {
  lockedRatio = r;
  document.getElementById('unlockBtn').style.display = r ? 'block' : 'none';
}

function sampleEdgeColor(canvas) {
  // Average a 6-pixel border so noisy art doesn't pull the spine colour around.
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height, b = Math.max(2, Math.floor(Math.min(w, h) * 0.04));
  const samples = [
    ctx.getImageData(0, 0, w, b).data,
    ctx.getImageData(0, h - b, w, b).data,
    ctx.getImageData(0, 0, b, h).data,
    ctx.getImageData(w - b, 0, b, h).data,
  ];
  let r = 0, g = 0, bl = 0, n = 0;
  for (const d of samples) {
    for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; bl += d[i+2]; n++; }
  }
  const c = new THREE.Color();
  c.setRGB(r / n / 255, g / n / 255, bl / n / 255, THREE.SRGBColorSpace);
  return c;
}

function applyFrontCover(img) {
  if (!coverMesh) return;
  // Sample edge colour for back/spine.
  const probe = document.createElement('canvas');
  probe.width = img.naturalWidth; probe.height = img.naturalHeight;
  probe.getContext('2d').drawImage(img, 0, 0);
  const edge = sampleEdgeColor(probe);

  // Front material gets the image; back & spine get the sampled edge colour.
  if (currentTexture) currentTexture.dispose();
  currentTexture = new THREE.Texture(img);
  currentTexture.colorSpace = THREE.SRGBColorSpace;
  currentTexture.anisotropy = 8;
  currentTexture.wrapS = THREE.ClampToEdgeWrapping;
  currentTexture.wrapT = THREE.ClampToEdgeWrapping;
  currentTexture.needsUpdate = true;

  // Blue = front cover material group (to verify group assignment)
  const front = coverMesh._frontMat;
  front.map = currentTexture;
  front.color.set(0xffffff);
  front.needsUpdate = true;

  for (const m of [coverMesh._backMat, coverMesh._spineMat]) {
    m.map = null;
    m.color.copy(edge);
    m.needsUpdate = true;
  }
  // Pages are paper — never tinted by the cover image, never textured.
  if (coverMesh._pageMat) {
    coverMesh._pageMat.map = null;
    coverMesh._pageMat.color.set(0xf5f1e8);
    coverMesh._pageMat.emissive?.set(0x000000);
    coverMesh._pageMat.needsUpdate = true;
  }

  // Lock book aspect ratio to the image.
  const ratio = img.naturalHeight / img.naturalWidth;
  setRatioLock(ratio);
  // Update height to match current width × ratio.
  const w = parseFloat(sliders.w.value);
  const newH = Math.max(parseFloat(sliders.h.min), Math.min(parseFloat(sliders.h.max), w * ratio));
  suppressSlider = true;
  sliders.h.value = newH;
  vals.h.textContent = newH.toFixed(1);
  applySize(w, newH, parseFloat(sliders.t.value));
  suppressSlider = false;
}

document.getElementById('unlockBtn').addEventListener('click', () => setRatioLock(null));

coverInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  coverNameEl.textContent = file.name;
  const url = URL.createObjectURL(file);
  coverPreview.src = url;
  coverPreview.style.display = 'block';

  const img = new Image();
  img.onload = () => applyFrontCover(img);
  img.src = url;
});

// ── Resize ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animate ─────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (mixer) mixer.update(0); // times handled manually
  orbitControls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
