<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Book Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body { background: #f4f1ec; font-family: system-ui, sans-serif; overflow: hidden; }

    #tabs {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 4px;
      background: rgba(20, 20, 26, 0.88);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 4px;
      backdrop-filter: blur(12px);
      z-index: 30;
    }
    .tab {
      padding: 8px 18px;
      background: transparent; border: none;
      color: #aaa; font-size: 0.8rem; font-family: inherit;
      border-radius: 7px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab:hover { color: #fff; }
    .tab.active {
      background: rgba(108,143,255,0.22);
      color: #fff;
    }

    iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0;
    }
    iframe.hidden { display: none; }
  </style>
</head>
<body>

<div id="tabs">
  <button class="tab active" data-frame="classicFrame">Hardcover</button>
  <button class="tab" data-frame="noteFrame">Notebook (flip)</button>
</div>

<iframe id="classicFrame" src="./classic.html"></iframe>
<iframe id="noteFrame" class="hidden" data-src="./note/index.html"></iframe>

<script>
  const tabs = document.querySelectorAll('.tab');
  const frames = {
    classicFrame: document.getElementById('classicFrame'),
    noteFrame: document.getElementById('noteFrame'),
  };

  tabs.forEach((btn) => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.frame;
      tabs.forEach((t) => t.classList.toggle('active', t === btn));
      Object.entries(frames).forEach(([id, iframe]) => {
        const show = id === target;
        iframe.classList.toggle('hidden', !show);
        if (show && !iframe.src && iframe.dataset.src) {
          iframe.src = iframe.dataset.src;
        }
      });
    });
  });
</script>
</body>
</html>
